apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: familytasks-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo:1.0
          args:
            - "-text=FamilyTasks Engine Hub Active. API Routing to PostgreSQL Database Successful."
            - "-listen=:8080"
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: familytasks-dev
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
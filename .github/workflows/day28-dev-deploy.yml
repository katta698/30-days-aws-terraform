name: Day 28 Dev Deploy 3 Tier App

concurrency:
  group: day28-dev-terraform
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "day-28 - 3-Tier AWS Infrastructure/**"
      - ".github/workflows/day28-dev-deploy.yml"

  pull_request:
    branches:
      - main
    paths:
      - "day-28 - 3-Tier AWS Infrastructure/**"
      - ".github/workflows/day28-dev-deploy.yml"

env:
  AWS_REGION: us-east-1
  TF_DIR: "day-28 - 3-Tier AWS Infrastructure/terraform"
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/goal-tracker-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/goal-tracker-backend

jobs:
  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: "day-28 - 3-Tier AWS Infrastructure/frontend"
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: "day-28 - 3-Tier AWS Infrastructure/backend"
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Create terraform.auto.tfvars
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > terraform.auto.tfvars <<EOF
          frontend_image = "${{ env.FRONTEND_IMAGE }}:latest"
          backend_image  = "${{ env.BACKEND_IMAGE }}:latest"
          db_password    = "${{ secrets.DB_PASSWORD }}"
          my_ip_cidr     = "${{ secrets.MY_IP_CIDR }}"
          EOF

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -input=false

  terraform-apply-dev:
    name: Terraform Apply Dev
    runs-on: ubuntu-latest
    needs: [docker-build-push, terraform-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Create terraform.auto.tfvars
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > terraform.auto.tfvars <<EOF
          frontend_image = "${{ env.FRONTEND_IMAGE }}:latest"
          backend_image  = "${{ env.BACKEND_IMAGE }}:latest"
          db_password    = "${{ secrets.DB_PASSWORD }}"
          my_ip_cidr     = "${{ secrets.MY_IP_CIDR }}"
          EOF

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false
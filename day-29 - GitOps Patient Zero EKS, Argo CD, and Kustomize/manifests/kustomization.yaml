apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: familytasks-dev

resources:
  - namespace.yaml
  - secret.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml

commonLabels:
  project: day29-gitops
  owner: jay
  managed-by: argocd

commonAnnotations:
  learning-project: "Day 29 GitOps with Argo CD, EKS, and Kustomize"

images:
  - name: nginx
    newTag: 1.27-alpine
  - name: postgres
    newTag: 16-alpine
  - name: hashicorp/http-echo
    newTag: "1.0"

replicas:
  - name: frontend
    count: 2
  - name: backend
    count: 2
  - name: postgres
    count: 1
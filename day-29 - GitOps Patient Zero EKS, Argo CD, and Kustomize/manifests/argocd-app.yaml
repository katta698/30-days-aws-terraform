apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: familytasks-gitops-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/katta698/30-days-aws-terraform.git
    targetRevision: main
    path: /c/Users/katta/Downloads/30-days-aws-terraform/day-29 - GitOps Patient Zero EKS, Argo CD, and Kustomize/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: familytasks-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true